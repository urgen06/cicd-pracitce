name: Build Angular App

on:  
  push:
    branches: [ main ]

jobs:
   build-angular:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Js
        uses: actions/setup-node@v6
        with: 
          node-version: 18.x 
      
      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts  
          path:  dist
  
   deploy-angular:
    runs-on: ubuntu-latest
    needs: build-angular

    steps: 
      - name: Test
        run: echo "Test step"
      
