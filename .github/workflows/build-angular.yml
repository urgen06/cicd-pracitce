name: Build Angular App

on:  
  push:
    branches: [ main ]

jobs:
   build-angular:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node Js
        uses: actions/setup-node@v6
        with: 
          node-version: 18.x 
      
      - name: Install Dependencies
        run: npm install

      - name: Build
        run: npm run build
      
